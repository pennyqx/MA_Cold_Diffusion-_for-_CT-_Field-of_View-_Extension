# Base config shared by baseline and timestep experiments

experiment_name: base_fast

seed: 42

model:
  type: cold_diffusion
  dim: 64
  dim_mults: [1, 2, 4, 8]
  channels: 1
  with_time_emb: true
  residual: false

diffusion:
  timesteps: 100
  keep_center: 11
  sampling_routine: x0_step_down
  loss_type: l1
  beta_schedule: cosine

data:
  image_size: [360, 640]
  data_dir: data/train_val_sinograms
  batch_size: 8
  num_workers: 4
  val_num_workers: 0
  split_ratio: 0.8
  val_n_center: 11
  val_n_uniform: 10

training:
  lr: 1.0e-4
  lr_min: 5.0e-6
  lr_schedule: cosine
  warmup_steps: 2000
  total_steps: 150000
  val_interval: 1000000000
  val_max_batches: null
  val_truncation_ratio: 0.25
  save_interval: 10000

  ema_beta: 0.9995
  ema_start_step: 2000
  ema_update_every: 10

  enable_amp: true
  grad_clip_norm: 1.0

  early_stop_patience: 10
  early_stop_delta: 0.05

  keep_last_ckpt: 3

results_dir: results/fast
