# Fair baseline: UNet Inpainting (keep_center=320)

experiment_name: baseline_unet_inpaint_k320

model:
  type: unet_inpaint
  dim: 64
  dim_mults: [1, 2, 4, 8]

diffusion:
  keep_center: 320
  loss_type: l1

training:
  total_steps: 100000
  lr: 1.0e-4
  val_interval: 5000
  val_max_batches: 120
  val_truncation_ratio: 0.25
  save_interval: 10000

results_dir: results/baselines/unet_inpaint_k320
